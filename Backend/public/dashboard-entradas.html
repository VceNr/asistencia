<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Entradas</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css">

  <style>
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="top-bar">
    <h1>📊 Entradas vs Salidas</h1>
    <button onclick="volver()">⬅ Volver</button>
  </div>

  <div class="card">
    <label>Filtrar por día:</label>
    <input type="date" id="filtroFecha">
    <button onclick="cargarDatos()">Aplicar</button>
  </div>

  <div class="card">
    <canvas id="grafico"></canvas>
  </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
