<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrador</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

<!--LOGIN -->
<div id="login" class="login-wrapper">
  <div class="login-box">
    <h2>🔐 Iniciar Sesión</h2>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button id="btnLogin" type="button">Ingresar</button>
  </div>
</div>

<!--APP -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Panel de Control</h2>

    <nav>
      <button id="btnActividad">📊 Actividad</button>
      <button id="btnDashboard">📊 Dashboard</button>
      <button id="btnLogout" class="logout">Cerrar sesión</button>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="main">

    <header class="topbar">
      <h1>Camiones</h1>
    </header>

    <section class="content">

      <div class="card">
        <h3>🚚 Camiones registrados</h3>
        <div id="listaCamionesAdmin"></div>
      </div>

    </section>

  </main>

</div>

<script type="module" src="js/admin.js" defer></script>
</body>
</html>
